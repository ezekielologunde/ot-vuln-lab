<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; img-src 'self' data:; base-uri 'none'; form-action 'none'; frame-ancestors 'none'">
<meta name="robots" content="noindex">
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<title>404 — OT Vuln Lab</title>
<style>
:root{--bg:#0a0b0d;--ink:#f4f5f7;--muted:#969ba3;--accent:#ec0000;--line:rgba(255,255,255,.1)}
*{box-sizing:border-box;margin:0}
body{background:var(--bg);color:var(--ink);font-family:system-ui,-apple-system,"Segoe UI",Arial,sans-serif;min-height:100vh;display:grid;place-items:center;text-align:center;padding:24px}
.box{max-width:440px;display:grid;gap:14px;justify-items:center}
.logo{width:48px;height:48px;border-radius:12px;background:var(--accent);display:grid;place-items:center}
.code{font-size:72px;font-weight:800;letter-spacing:-.03em;line-height:1}
h1{font-size:22px;font-weight:700}
p{color:var(--muted);font-size:15px}
a{display:inline-flex;align-items:center;gap:7px;margin-top:8px;background:var(--accent);color:#fff;text-decoration:none;font-weight:700;font-size:14px;padding:11px 20px;border-radius:9px}
a:hover{filter:brightness(1.08)}
.alt{color:var(--muted);font-size:13px;margin-top:4px}
.alt a{background:none;color:var(--muted);padding:0;font-weight:600;text-decoration:underline}
</style>
</head>
<body>
  <div class="box">
    <div class="logo"><svg width="26" height="26" viewBox="0 0 20 20" fill="none"><path d="M4 14 L8 6 L12 11 L14 8 L16 14" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
    <div class="code">404</div>
    <h1>Page not found</h1>
    <p>That route doesn't exist in this workspace. Head back to the landing page or jump straight into the console.</p>
    <a href="/">Back to home</a>
    <div class="alt">or <a href="/app.html">open the console</a></div>
  </div>
</body>
</html>
